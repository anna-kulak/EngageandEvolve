
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slide-out Mobile Menu</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }

    /* Top bar */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid rgba(0,0,0,.1);
      background:#fff;
      position:sticky;
      top:0;
      z-index:50;
    }
    .brand{ font-weight:700; text-decoration:none; color:#111; }
    .menu-btn{
      border:1px solid rgba(0,0,0,.15);
      background:#fff;
      border-radius:10px;
      padding:10px 12px;
      cursor:pointer;
      font-size:14px;
    }

    /* Overlay */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.35);
      opacity:0;
      pointer-events:none;
      transition: opacity 240ms ease;
      z-index:60;
    }
    .overlay.is-open{
      opacity:1;
      pointer-events:auto;
    }

    /* Slide-out panel */
    .mobile-panel{
      position:fixed;
      top:0;
      right:0;
      height:100%;
      width:min(86vw, 360px);
      background:#fff;
      box-shadow:-18px 0 40px rgba(0,0,0,.18);
      transform: translateX(100%);         /* start off-screen */
      transition: transform 280ms ease;    /* <-- ease slide */
      z-index:70;
      display:flex;
      flex-direction:column;
      padding:16px;
    }
    .mobile-panel.is-open{
      transform: translateX(0);            /* slide in */
    }

    .panel-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding-bottom:10px;
      border-bottom:1px solid rgba(0,0,0,.08);
      margin-bottom:10px;
    }
    .close-btn{
      border:1px solid rgba(0,0,0,.15);
      background:#fff;
      border-radius:10px;
      padding:8px 10px;
      cursor:pointer;
      font-size:14px;
    }

    .nav-links{
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:8px 0;
    }
    .nav-links a{
      text-decoration:none;
      color:#111;
      padding:10px 10px;
      border-radius:10px;
    }
    .nav-links a:hover{
      background: rgba(0,0,0,.05);
    }

    /* Desktop example (hide button) */
    @media (min-width: 900px){
      .menu-btn{ display:none; }
    }

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce){
      .overlay, .mobile-panel{ transition:none; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a class="brand" href="#">Your Brand</a>
    <button class="menu-btn" id="openMenu" aria-controls="mobilePanel" aria-expanded="false">
      Menu
    </button>
  </header>

  <!-- Overlay -->
  <div class="overlay" id="overlay" hidden></div>

  <!-- Slide-out panel -->
  <aside class="mobile-panel" id="mobilePanel" aria-hidden="true">
    <div class="panel-header">
      <strong>Menu</strong>
      <button class="close-btn" id="closeMenu" aria-label="Close menu">Close</button>
    </div>

    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">Services</a>
      <a href="#">Portfolio</a>
      <a href="#">Contact</a>
    </nav>
  </aside>

  <script>
    const openBtn = document.getElementById('openMenu');
    const closeBtn = document.getElementById('closeMenu');
    const panel = document.getElementById('mobilePanel');
    const overlay = document.getElementById('overlay');

    function openMenu(){
      overlay.hidden = false; // allow fade-in
      requestAnimationFrame(() => {
        overlay.classList.add('is-open');
        panel.classList.add('is-open');
      });
      panel.setAttribute('aria-hidden', 'false');
      openBtn.setAttribute('aria-expanded', 'true');
      // Optional: prevent background scroll
      document.body.style.overflow = 'hidden';
    }

    function closeMenu(){
      overlay.classList.remove('is-open');
      panel.classList.remove('is-open');
      panel.setAttribute('aria-hidden', 'true');
      openBtn.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
      // hide overlay after transition
      setTimeout(() => { overlay.hidden = true; }, 280);
    }

    openBtn.addEventListener('click', openMenu);
    closeBtn.addEventListener('click', closeMenu);
    overlay.addEventListener('click', closeMenu);

    // Close on ESC
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && panel.classList.contains('is-open')) closeMenu();
    });
  </script>

</body>
</html>
